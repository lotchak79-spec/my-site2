<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot for Small Business</title>
    <link rel="icon" href="data:,">
    <!-- Прямой путь к стилям без url_for -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>Увеличьте продажи с помощью нашего телеграмм бота</h1>
            <p>Инструмент для автоматизации и управления вашим бизнесом</p>
            <button>Получить бесплатную консультацию</button>
        </div>
    </div>

<!-- ... (остальной код) -->
    <div class="features">
        <div class="features-content">
            <!-- Текст преимуществ -->
        </div>
        <!-- ВАЖНО: Добавлен класс centered-image -->
        <img src="images/efP.jpg" class="centered-image" alt="Features Background">
    </div>
<!-- ... (остальной код) -->


    <div class="social-proof">
        <h2>Отзывы наших клиентов</h2>
        <p>Читайте отзывы наших довольных клиентов</p>
    </div>

    <div class="contact">
        <h2>Оставьте свои контактные данные</h2>
        <!-- На GitHub Pages нельзя отправить POST на Flask, поэтому временно ставим # -->
        <form action="#" method="POST">
            <input type="text" placeholder="Имя" required>
            <input type="text" placeholder="Email/Телефон" required>
            <button type="submit">Отправить</button>
        </form>
    </div>

    <!-- Прямой путь к скрипту без url_for -->
    <script src="script.js"></script>
</body>
</html>
